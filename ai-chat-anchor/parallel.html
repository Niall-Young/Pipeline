<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI 新建对话</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f4f4f5;
      --surface: #ffffff;
      --text: #09090b;
      --text-2: #71717a;
      --border: #e4e4e7;
      --border-2: #d4d4d8;
      --accent: #18181b;
      --accent-text: #fafafa;
      --radius: 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090b;
        --surface: #18181b;
        --text: #fafafa;
        --text-2: #a1a1aa;
        --border: #27272a;
        --border-2: #3f3f46;
        --accent: #fafafa;
        --accent-text: #09090b;
      }
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #toolbar-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      color: var(--text);
    }

    #platform-select {
      padding: 7px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      cursor: pointer;
      flex-shrink: 0;
    }

    #question-input {
      flex: 1;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      resize: none;
      height: 38px;
      line-height: 1.5;
      overflow: hidden;
    }

    #question-input:focus {
      border-color: var(--border);
    }

    #question-input::placeholder {
      color: var(--text-2);
    }

    #send-btn {
      padding: 8px 16px;
      background: var(--accent);
      color: var(--accent-text);
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #send-btn:hover:not(:disabled) { opacity: 0.8; }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #pane-count {
      font-size: 12px;
      color: var(--text-2);
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 48px;
      text-align: right;
    }

    /* ── Panes ── */
    #panes-container {
      display: flex;
      flex: 1;
      gap: 6px;
      padding: 10px;
      overflow-x: auto;
      background: var(--bg);
    }

    .pane {
      position: relative;
      flex: 1;
      min-width: 380px;
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .pane-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }

    .pane-title {
      font-size: 11px;
      color: var(--text-2);
      font-weight: 500;
      white-space: nowrap;
    }

    .pane-question {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pane-close {
      width: 22px;
      height: 22px;
      border: none;
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
      transition: all 0.12s;
      flex-shrink: 0;
    }

    .pane-close:hover {
      background: var(--border);
      color: var(--text);
    }

    .pane iframe {
      width: 100%;
      flex: 1;
      border: none;
      display: block;
    }

    /* ── Empty state ── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 10px;
      color: var(--text-2);
      pointer-events: none;
    }

    #empty-state .empty-icon {
      font-size: 28px;
      opacity: 0.5;
    }

    #empty-state p {
      font-size: 13px;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <span id="toolbar-title">新建对话</span>
    <select id="platform-select">
      <option value="claude">Claude</option>
      <option value="chatgpt">ChatGPT</option>
      <option value="gemini">Gemini</option>
      <option value="doubao">豆包</option>
      <option value="qianwen">千问</option>
    </select>
    <textarea id="question-input" placeholder="输入问题，Enter 发送，Shift+Enter 换行..."></textarea>
    <button id="send-btn" disabled>发送到新窗格</button>
    <span id="pane-count"></span>
  </div>

  <div id="panes-container">
    <div id="empty-state">
      <div class="empty-icon">⚡</div>
      <p>在顶部输入问题，按 Enter 或点击「发送到新窗格」<br>每次发送都会新增一个 AI 窗格并行回答</p>
    </div>
  </div>

  <script src="parallel.js"></script>
</body>
</html>
